<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frontend A — Administračné rozhranie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      padding: 30px 20px;
    }
    header {
      background: linear-gradient(135deg, #0078d4, #005fa3);
      color: white;
      padding: 20px 28px;
      border-radius: 12px;
      margin-bottom: 28px;
    }
    header h1 { font-size: 1.6rem; }
    header p  { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
    nav { margin-top: 14px; display: flex; gap: 10px; flex-wrap: wrap; }
    nav a {
      background: rgba(255,255,255,0.2);
      color: white;
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.35); }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media(max-width:700px){ .grid { grid-template-columns: 1fr; } }
    .karta {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .karta h2 { font-size: 1.1rem; margin-bottom: 16px; color: #0078d4; display: flex; align-items: center; gap: 8px; }
    label   { font-size: 0.85rem; font-weight: 600; color: #4a5568; display: block; margin-bottom: 4px; margin-top: 12px; }
    input, select {
      width: 100%; padding: 9px 12px; border: 1.5px solid #cbd5e0;
      border-radius: 7px; font-size: 0.95rem; transition: border-color 0.2s;
    }
    input:focus, select:focus { outline: none; border-color: #0078d4; }
    button {
      width: 100%; margin-top: 16px; padding: 11px;
      background: #0078d4; color: white; border: none;
      border-radius: 7px; font-size: 1rem; cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #005fa3; }
    .vysledok-box {
      margin-top: 14px; padding: 12px 16px;
      border-radius: 8px; background: #ebf5fb;
      font-size: 1.1rem; font-weight: 700; color: #005fa3;
      min-height: 44px; display: none;
    }
    .chyba-box {
      margin-top: 10px; color: #c0392b; font-size: 0.9rem;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.88rem; }
    th { background: #0078d4; color: white; padding: 8px 10px; text-align: left; }
    td { padding: 8px 10px; border-bottom: 1px solid #e2e8f0; }
    tr:hover td { background: #f7fbff; }
    .prazdne { color: #a0aec0; font-style: italic; text-align: center; padding: 20px; }
    .sekcia-historia { margin-top: 28px; }
  </style>
</head>
<body>

<header>
  <h1>🖥️ Frontend A — Administračné rozhranie</h1>
  <p>Tento formulár odosiela dáta na backend pomocou GET requestu.</p>
  <nav>
    <a href="/">🔢 Kalkulačka</a>
    <a href="/klient">📋 Frontend B</a>
    <a href="/api/historia">/api/historia</a>
    <a href="/api/historia-prevodov">/api/historia-prevodov</a>
  </nav>
</header>

<div class="grid">

  <!-- ── Kalkulačka ── -->
  <div class="karta">
    <h2>🔢 Kalkulačka</h2>
    <form id="formKalkulacka">
      <label>Číslo 1:</label>
      <input type="number" id="cislo1" step="any" placeholder="napr. 10" required>
      <label>Číslo 2:</label>
      <input type="number" id="cislo2" step="any" placeholder="napr. 5" required>
      <label>Operácia:</label>
      <select id="operacia">
        <option value="plus">➕ Plus (+)</option>
        <option value="minus">➖ Mínus (−)</option>
        <option value="krat">✖️ Krát (×)</option>
        <option value="deleno">➗ Deleno (÷)</option>
      </select>
      <button type="submit">Vypočítať</button>
    </form>
    <div id="vysledokKalk" class="vysledok-box"></div>
    <div id="chybaKalk" class="chyba-box"></div>
  </div>

  <!-- ── Prevodník jednotiek ── -->
  <div class="karta">
    <h2>📐 Prevodník IoT jednotiek</h2>
    <form id="formPrevod">
      <label>Hodnota:</label>
      <input type="number" id="hodnotaPrevod" step="any" placeholder="napr. 25" required>
      <label>Typ prevodu:</label>
      <select id="typPrevod">
        <option value="c_to_f">🌡️ °C → °F  (teplota)</option>
        <option value="hpa_to_mmhg">🌬️ hPa → mmHg  (tlak)</option>
        <option value="ms_to_kmh">💨 m/s → km/h  (rýchlosť vetra)</option>
        <option value="km_to_miles">📏 km → míle  (vzdialenosť)</option>
        <option value="lux_to_fc">💡 lux → fc  (osvetlenosť)</option>
      </select>
      <button type="submit">Previesť</button>
    </form>
    <div id="vysledokPrevod" class="vysledok-box"></div>
    <div id="chybaPrevod" class="chyba-box"></div>
  </div>

</div>

<!-- ── História prevodov (pod formulármi) ── -->
<div class="karta sekcia-historia">
  <h2>🕒 História prevodov (zo súboru prevody.json)</h2>
  <div id="historiaPrevody">Načítavam...</div>
</div>

<script>
  // ── Kalkulačka ──────────────────────────────────────────────────────────
  document.getElementById("formKalkulacka").addEventListener("submit", async (e) => {
    e.preventDefault();
    const vBox = document.getElementById("vysledokKalk");
    const cBox = document.getElementById("chybaKalk");
    vBox.style.display = "none"; cBox.textContent = "";

    const c1  = document.getElementById("cislo1").value;
    const c2  = document.getElementById("cislo2").value;
    const op  = document.getElementById("operacia").value;

    try {
      const res  = await fetch(`/vypocet?cislo1=${c1}&cislo2=${c2}&operacia=${op}`);
      const data = await res.json();
      if (!res.ok) { cBox.textContent = data.chyba || "Chyba servera."; return; }
      const symboly = { plus:"+", minus:"−", krat:"×", deleno:"÷" };
      vBox.textContent = `${data.cislo1} ${symboly[data.operacia] || data.operacia} ${data.cislo2} = ${data.vysledok}`;
      vBox.style.display = "block";
    } catch { cBox.textContent = "Nepodarilo sa spojiť so serverom."; }
  });

  // ── Prevodník ────────────────────────────────────────────────────────────
  document.getElementById("formPrevod").addEventListener("submit", async (e) => {
    e.preventDefault();
    const vBox = document.getElementById("vysledokPrevod");
    const cBox = document.getElementById("chybaPrevod");
    vBox.style.display = "none"; cBox.textContent = "";

    const hodnota = document.getElementById("hodnotaPrevod").value;
    const typ     = document.getElementById("typPrevod").value;

    try {
      const res  = await fetch(`/api/prevod?hodnota=${hodnota}&typ=${typ}`);
      const data = await res.json();
      if (!res.ok) { cBox.textContent = data.chyba || "Chyba servera."; return; }
      vBox.textContent = "✅ " + data.popis;
      vBox.style.display = "block";
      nacitajHistoriuPrevody();
    } catch { cBox.textContent = "Nepodarilo sa spojiť so serverom."; }
  });

  // ── História prevodov ─────────────────────────────────────────────────────
  async function nacitajHistoriuPrevody() {
    const k = document.getElementById("historiaPrevody");
    try {
      const res     = await fetch("/api/historia-prevodov");
      const prevody = await res.json();
      if (!Array.isArray(prevody) || prevody.length === 0) {
        k.innerHTML = '<p class="prazdne">Zatiaľ žiadne prevody.</p>'; return;
      }
      const TYPY = {
        c_to_f:"°C → °F", hpa_to_mmhg:"hPa → mmHg",
        ms_to_kmh:"m/s → km/h", km_to_miles:"km → míle", lux_to_fc:"lux → fc"
      };
      const riadky = [...prevody].reverse().slice(0, 10).map(p => `
        <tr>
          <td>${p.hodnota}</td>
          <td>${TYPY[p.typ] || p.typ}</td>
          <td><strong>${p.vysledok}</strong></td>
          <td>${p.popis}</td>
          <td>${p.cas}</td>
        </tr>`).join("");
      k.innerHTML = `
        <table>
          <thead><tr><th>Vstup</th><th>Typ</th><th>Výsledok</th><th>Popis</th><th>Čas</th></tr></thead>
          <tbody>${riadky}</tbody>
        </table>`;
    } catch { k.innerHTML = '<p style="color:red">Chyba pri načítaní histórie.</p>'; }
  }

  nacitajHistoriuPrevody();
</script>
</body>
</html>
